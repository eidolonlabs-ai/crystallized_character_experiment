# Lyra character fine-tune on Llama-3.1-8B-Instruct — modern recipe.
#
#   ./scripts/train_character_model.sh baseline llama31_8b --config configs/lyra_llama31_8b.yaml
#
# (Without `--config`, train_character_model.sh builds an equivalent YAML on
# the fly from scripts/model_config.py::DEFAULT_TRAINING — this file exists
# so users have something to copy and modify.)

model: meta-llama/Llama-3.1-8B-Instruct

# mlx_lm lora keys.
train: true
fine_tune_type: lora          # or "dora"
optimizer: adamw              # adam | adamw | muon | sgd | adafactor
seed: 42
mask_prompt: false            # see docs/HYPERPARAMETERS.md for the trade-off
grad_checkpoint: false        # enable on <32 GB unified memory

# LoRA structure. alpha/rank = 2.0 is a common starting point.
lora_parameters:
  rank: 16
  dropout: 0.05
  scale: 32

# Run-specific knobs (passed as CLI flags by train_character_model.sh):
#
# num_layers: 8               # standard; 16 for deep
# learning_rate: 5e-5         # standard; 2.5e-5 for deep
# max_seq_length: 2048         # both variants; full context, zero truncation
# batch_size: 1
# grad_accumulation_steps: 2   # standard; 4 for deep
# epochs: 5
# save_every: 50
# steps_per_report: 10
# steps_per_eval: 50
